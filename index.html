<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BLOCKDROP — Puzzle Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Particle canvas for effects -->

<canvas id="particleCanvas"></canvas>

  <!-- Animated background orbs -->

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
  </div>

  <!-- ===== START SCREEN ===== -->

  <div id="startScreen" class="screen active">
    <div class="start-content">
      <div class="logo-wrap">
        <div class="logo-block logo-b1"></div>
        <div class="logo-block logo-b2"></div>
        <div class="logo-block logo-b3"></div>
        <div class="logo-block logo-b4"></div>
        <h1 class="logo-text">BLOCK<span>DROP</span></h1>
      </div>
      <p class="tagline">Stack. Clear. Dominate.</p>
      <div class="best-score-wrap" id="startBest">
        <span class="best-label">BEST</span>
        <span class="best-value" id="startBestVal">0</span>
      </div>
      <button class="btn-play" id="btnPlay">
        <span class="btn-inner">PLAY NOW</span>
        <div class="btn-shine"></div>
      </button>
      <p class="how-text">Drag blocks onto the grid. Fill rows & columns to clear them!</p>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->

  <div id="gameScreen" class="screen">
    <header class="game-header">
      <div class="score-box">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="scoreDisplay">0</div>
      </div>
      <div class="title-center">
        <span class="header-title">BLOCKDROP</span>
        <div class="combo-display" id="comboDisplay"></div>
      </div>
      <div class="score-box best-box">
        <div class="score-label">BEST</div>
        <div class="score-value" id="bestDisplay">0</div>
      </div>
    </header>

```
<main class="game-main">
  <!-- Grid -->
  <div class="grid-container">
    <div class="grid-wrapper">
      <div id="gameGrid" class="game-grid"></div>
      <div id="dropPreview" class="drop-preview"></div>
    </div>
  </div>

  <!-- Block tray -->
  <div class="tray-section">
    <div class="tray" id="blockTray">
      <div class="tray-slot" id="slot0"></div>
      <div class="tray-slot" id="slot1"></div>
      <div class="tray-slot" id="slot2"></div>
    </div>
  </div>
</main>

  </div>

  <!-- ===== GAME OVER MODAL ===== -->

  <div id="gameOverModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-glow"></div>
      <h2 class="modal-title">GAME OVER</h2>
      <div class="modal-scores">
        <div class="modal-score-item">
          <div class="ms-label">YOUR SCORE</div>
          <div class="ms-value" id="finalScore">0</div>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-score-item">
          <div class="ms-label">BEST SCORE</div>
          <div class="ms-value best-color" id="finalBest">0</div>
        </div>
      </div>
      <div class="new-best-badge" id="newBestBadge">🏆 NEW BEST!</div>
      <button class="btn-play btn-restart" id="btnRestart">
        <span class="btn-inner">PLAY AGAIN</span>
        <div class="btn-shine"></div>
      </button>
    </div>
  </div>

  <!-- Score float container -->

  <div id="scoreFloats" class="score-floats"></div>

  <script src="script.js"></script>

</body>
</html>
